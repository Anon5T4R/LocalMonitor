<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f87171"/>
      <stop offset="1" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- fundo -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="512" rx="200" fill="url(#sheen)"/>

  <!-- painel -->
  <rect x="212" y="252" width="600" height="470" rx="44" fill="#ffffff" opacity="0.95"/>

  <!-- pulso/atividade -->
  <polyline points="252,540 360,540 404,420 462,620 520,380 566,560 610,480 772,480"
            fill="none" stroke="#dc2626" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- barras de núcleo -->
  <g fill="#fecaca">
    <rect x="286" y="320" width="52" height="56" rx="10"/>
    <rect x="356" y="300" width="52" height="76" rx="10"/>
    <rect x="426" y="336" width="52" height="40" rx="10"/>
    <rect x="496" y="288" width="52" height="88" rx="10"/>
    <rect x="566" y="316" width="52" height="60" rx="10"/>
    <rect x="636" y="300" width="52" height="76" rx="10"/>
  </g>

  <!-- easter egg da marca -->
  <text x="512" y="900" font-family="Segoe Script, cursive" font-size="80"
        fill="#ffffff" opacity="0.55" text-anchor="middle">Taylor</text>
</svg>
